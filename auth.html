<!doctype html>
<html lang="az">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartPortal Auth</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="index.html"><img src="public/assets/icon.svg" alt=""><span>SmartPortal Auth</span></a>
        <nav class="nav"><a class="btn" href="index.html" data-auth-i18n="home">Ana səhifə</a><a class="btn" href="portal.html" data-auth-i18n="portal">Portal</a><a class="btn primary" href="admin.html">Admin</a></nav>
      </header>
      <main>
        <section class="auth-box glass">
          <p class="eyebrow" data-auth-i18n="eyebrow">Secure Client Access</p>
          <h1 data-auth-i18n="title">Qeydiyyat və giriş mərkəzi</h1>
          <div class="tabs">
            <button class="btn" type="button" data-tab="login" data-auth-i18n="login">Daxil ol</button>
            <button class="btn" type="button" data-tab="register" data-auth-i18n="register">Qeydiyyat</button>
            <button class="btn" type="button" data-tab="forgot" data-auth-i18n="forgot">Parolu unutdum</button>
            <button class="btn" type="button" data-tab="update" data-auth-i18n="newPassword">Yeni parol</button>
          </div>
          <form class="tab-panel" data-tab-panel="login" data-login-form>
            <input class="field" name="email" type="email" placeholder="Email" data-auth-placeholder="email">
            <input class="field" name="password" type="password" placeholder="Parol" data-auth-placeholder="password">
            <button class="btn primary" type="button" data-auth-action data-auth-i18n="loginAction">Portala daxil ol</button>
          </form>
          <form class="tab-panel" data-tab-panel="register" data-register-form>
            <input class="field" name="fullName" placeholder="Ad Soyad" data-auth-placeholder="fullName">
            <input class="field" name="company" placeholder="Şirkət" data-auth-placeholder="company">
            <input class="field" name="email" type="email" placeholder="Email" data-auth-placeholder="email">
            <input class="field" name="password" type="password" placeholder="Parol" data-auth-placeholder="password">
            <button class="btn primary" type="button" data-auth-action data-auth-i18n="registerAction">Hesab yarat</button>
          </form>
          <form class="tab-panel" data-tab-panel="forgot" data-forgot-form>
            <input class="field" name="email" type="email" placeholder="Email" data-auth-placeholder="email">
            <button class="btn hot" type="button" data-auth-action data-auth-i18n="resetAction">Reset link göndər</button>
          </form>
          <form class="tab-panel" data-tab-panel="update" data-update-form>
            <input class="field" name="password" type="password" placeholder="Yeni parol" data-auth-placeholder="newPassword">
            <button class="btn primary" type="button" data-auth-action data-auth-i18n="updateAction">Parolu yenilə</button>
          </form>
          <p class="muted" data-auth-notice></p>
        </section>
      </main>
    </div>
    <script src="js/supabase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
