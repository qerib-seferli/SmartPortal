<!doctype html>
<html lang="az">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartPortal Auth</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="index.html"><img src="public/assets/icon.svg" alt=""><span>SmartPortal Auth</span></a>
        <nav class="nav"><a class="btn" href="index.html">Ana səhifə</a><a class="btn" href="portal.html">Portal</a><a class="btn primary" href="admin.html">Admin</a></nav>
      </header>
      <main>
        <section class="auth-box glass">
          <p class="eyebrow">Secure Client Access</p>
          <h1 style="font-size:2.4rem">Qeydiyyat və giriş mərkəzi</h1>
          <div class="tabs">
            <button class="btn" type="button" data-tab="login">Daxil ol</button>
            <button class="btn" type="button" data-tab="register">Qeydiyyat</button>
            <button class="btn" type="button" data-tab="forgot">Parolu unutdum</button>
          </div>
          <form class="tab-panel" data-tab-panel="login">
            <input class="field" type="email" placeholder="Email">
            <input class="field" type="password" placeholder="Parol">
            <button class="btn primary" type="button" data-auth-action>Portala daxil ol</button>
          </form>
          <form class="tab-panel" data-tab-panel="register">
            <input class="field" placeholder="Ad Soyad">
            <input class="field" placeholder="Şirkət">
            <input class="field" type="email" placeholder="Email">
            <input class="field" type="password" placeholder="Parol">
            <button class="btn primary" type="button" data-auth-action>Hesab yarat</button>
          </form>
          <form class="tab-panel" data-tab-panel="forgot">
            <input class="field" type="email" placeholder="Email">
            <button class="btn hot" type="button" data-auth-action>Reset link göndər</button>
          </form>
          <p class="muted" data-auth-notice></p>
        </section>
      </main>
    </div>
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
