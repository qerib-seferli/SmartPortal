<!-- START — PRO SAYT HESABLAMA KALKULYATORU -->
<style>
  .calc-container {
    max-width: 800px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 10px;
    background: #fff;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    font-family: Arial, sans-serif;
  }
  .calc-title {
    font-size: 28px;
    margin-bottom: 15px;
    text-align: center;
    color: #222;
  }
  .calc-group {
    margin-bottom: 15px;
  }
  .calc-group label {
    font-size: 16px;
    display: block;
    margin-bottom: 5px;
    color: #444;
  }
  .calc-group input[type="checkbox"] {
    margin-right: 8px;
  }
  .calc-group input,
  .calc-group select {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  .calc-total {
    font-size: 32px;
    text-align: center;
    padding: 15px;
    margin-top: 20px;
    background: #0a86ff;
    color: #fff;
    border-radius: 8px;
    font-weight: bold;
  }
</style>

<div class="calc-container">
  <div class="calc-title">Sayt Hazırlanma Qiymət Hesablayıcısı</div>
  
  <div class="calc-group">
    <label><input type="checkbox" class="option-checkbox" data-price="1500"> Sadə sayt (statik)</label>
    <label><input type="checkbox" class="option-checkbox" data-price="1500"> Admin panel</label>
    <label><input type="checkbox" class="option-checkbox" data-price="1800"> Ödəniş inteqrasiyası</label>
    <label><input type="checkbox" class="option-checkbox" data-price="3000"> E‑ticaret / Marketplace</label>
    <label><input type="checkbox" class="option-checkbox" data-price="800"> Multi‑dil dəstəyi</label>
    <label><input type="checkbox" class="option-checkbox" data-price="700"> Mobil optimizasiya</label>
    <label><input type="checkbox" class="option-checkbox" data-price="500"> SEO optimizasiya</label>
    <label><input type="checkbox" class="option-checkbox" data-price="1000"> Filtr + kateqoriya sistemi</label>
    <label><input type="checkbox" class="option-checkbox" data-price="600"> Cloudinary / media sistemi</label>
    <label><input type="checkbox" class="option-checkbox" data-price="500"> Email notifications</label>
  </div>

  <div class="calc-total" id="calcTotal">Ümumi Qiymət: 0 AZN</div>
</div>

<script>
  const checkboxes = document.querySelectorAll('.option-checkbox');
  const totalEl = document.getElementById('calcTotal');

  function updateTotal() {
    let total = 0;
    checkboxes.forEach(cb => {
      if (cb.checked) {
        total += parseInt(cb.dataset.price);
      }
    });
    totalEl.textContent = `Ümumi Qiymət: ${total.toLocaleString()} AZN`;
  }

  checkboxes.forEach(cb => cb.addEventListener('change', updateTotal));
</script>
<!-- END — PRO SAYT HESABLAMA KALKULYATORU -->
