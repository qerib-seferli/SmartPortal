<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPortal Qiymət Kalkulyatoru</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Montserrat',sans-serif;margin:0;padding:0;background:#f4f4f9;color:#333;}
.container{max-width:1000px;margin:50px auto;padding:20px;background:white;border-radius:15px;box-shadow:0 8px 25px rgba(0,0,0,0.1);}
h1,h2{color:#003366;text-align:center;margin-bottom:30px;}
label{display:block;margin:15px 0 5px;font-weight:600;}
select, input[type="checkbox"], input[type="number"], input[type="range"]{margin-right:10px;padding:8px;border-radius:6px;border:1px solid #ccc;}
.checkbox-group label{display:flex;align-items:center;margin-bottom:10px;}
.total{margin-top:25px;font-size:1.5em;text-align:center;color:#003366;font-weight:700;}
button.cta{display:block;margin:25px auto;padding:12px 25px;background:#ffa500;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:0.3s;}
button.cta:hover{background:#ff7f00;}
@media(max-width:600px){.container{margin:20px;padding:15px;}}
</style>
</head>
<body>

<div class="container">
<h1>SmartPortal Qiymət Kalkulyatoru</h1>

<label for="package">Sayt Paketi:</label>
<select id="package">
<option value="400">Landing Page - 400 AZN</option>
<option value="600">Vizitka Sayt - 600 AZN</option>
<option value="1000">Korporativ - 1000 AZN</option>
<option value="1500">E-Ticarət - 1500 AZN</option>
</select>

<h2>Əlavə Xidmətlər</h2>
<div class="checkbox-group">
<label><input type="checkbox" class="addon" value="50"> Portfolio Bölməsi (+50 AZN)</label>
<label><input type="checkbox" class="addon" value="30"> Admin Panel (+30 AZN)</label>
<label><input type="checkbox" class="addon" value="40"> Canlı Chat / WhatsApp (+40 AZN)</label>
<label><input type="checkbox" class="addon" value="60"> SEO Optimizasiya (+60 AZN)</label>
<label><input type="checkbox" class="addon" value="20"> Bloq Bölməsi (+20 AZN)</label>
</div>

<h2>Layihə Prioriteti</h2>
<label for="priority">Təcili layihə: <span id="priorityVal">1x</span></label>
<input type="range" id="priority" min="1" max="2" step="0.1" value="1">

<div class="total">Cəmi Qiymət: <span id="total">0</span> AZN</div>
<button class="cta" id="orderBtn">Sifariş ver WhatsApp</button>
</div>

<script>
// Elementləri seçirik
const packageSelect = document.getElementById('package');
const addons = document.querySelectorAll('.addon');
const priority = document.getElementById('priority');
const totalDisplay = document.getElementById('total');
const priorityVal = document.getElementById('priorityVal');
const orderBtn = document.getElementById('orderBtn');

// Qiymət hesablaması funksiyası
function calculateTotal() {
    let base = parseFloat(packageSelect.value);
    let addonsTotal = 0;
    addons.forEach(a => { if(a.checked) addonsTotal += parseFloat(a.value); });
    let multiplier = parseFloat(priority.value);
    priorityVal.innerText = multiplier.toFixed(1) + "x";
    let total = (base + addonsTotal) * multiplier;
    totalDisplay.innerText = total.toFixed(0);
}

// Event listener-lər
packageSelect.addEventListener('change', calculateTotal);
addons.forEach(a => a.addEventListener('change', calculateTotal));
priority.addEventListener('input', calculateTotal);

// WhatsApp sifariş linki
orderBtn.addEventListener('click', ()=>{
    let total = totalDisplay.innerText;
    let msg = `Salam! Mən SmartPortal-da sayt sifarişi etmək istəyirəm. Ümumi qiymət: ${total} AZN.`;
    window.open(`https://wa.me/994505459085?text=${encodeURIComponent(msg)}`, '_blank');
});

// İlkin qiyməti hesablayırıq
calculateTotal();
</script>

</body>
</html>
